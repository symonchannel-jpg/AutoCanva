<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoCanva Export Viewer</title>
<style>
  *{ box-sizing:border-box; margin:0; padding:0 }
  body{
    background:#0e0e10; color:#e4e4e7;
    font-family:"Segoe UI", system-ui, sans-serif;
    font-size:14px; display:flex; height:100vh;
  }
  .sidebar{
    width:400px; flex-shrink:0;
    display:flex; flex-direction:column;
    border-right:1px solid #27272a; background:#18181b;
  }
  .sidebar textarea{
    flex:1; resize:none; border:none; outline:none;
    background:#1f1f23; color:#e4e4e7;
    font-family:"Cascadia Code", "Fira Code", monospace;
    font-size:12px; padding:12px; tab-size:2;
  }
  .sidebar button{
    margin:10px; padding:8px;
    background:#5b8def; color:#0b0d12; border:none;
    border-radius:6px; font-weight:600; cursor:pointer;
  }
  .sidebar button:hover{ filter:brightness(1.1); }
  .sidebar .hint{
    padding:8px 12px; color:#a1a1aa; font-size:12px;
    border-bottom:1px solid #27272a;
  }
  .preview{
    flex:1; display:flex; align-items:center; justify-content:center;
    background:#0a0a0c; overflow:auto; padding:24px;
  }
  #canvas{
    position:relative; background:#18181b;
    border:1px solid #27272a; border-radius:6px; overflow:hidden;
    flex-shrink:0;
  }
  .el{
    position:absolute; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:4px 6px; border:1px solid #27272a;
    border-radius:6px; font-size:12px; overflow:hidden;
    background:rgba(27,27,30,0.85); color:#e4e4e7;
  }
  .el--button{ background:rgba(91,141,239,0.3); cursor:pointer; }
  .el--text{ border-style:dashed; }
  .el--image{ border-style:dashed; color:#a1a1aa; background:transparent; }
  .el--rect{ background:transparent; border-color:#a1a1aa; }
  .el--icon{ background:transparent; border:none; font-size:22px; }
  .el .type-tag{
    position:absolute; top:1px; left:1px;
    font-size:9px; background:#27272a; color:#a1a1aa;
    padding:0 4px; border-radius:3px; opacity:0.7;
  }
  .status-bar{
    display:flex; gap:16px; padding:6px 12px;
    background:#18181b; border-top:1px solid #27272a;
    color:#a1a1aa; font-size:12px;
  }
  .error{ color:#ef4444; padding:8px 12px; font-size:12px; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="hint">Paste an AutoCanva export JSON here, then click <strong>Render</strong>.</div>
  <textarea id="input" placeholder='{\n  "app": "autocanva",\n  "schemaVersion": 1,\n  ...}'>{
  "app": "autocanva",
  "schemaVersion": 1,
  "generatedAt": "2026-06-27T20:00:00.000Z",
  "canvas": {
    "windowWidth": 1280,
    "windowHeight": 720,
    "canvasWidth": 800,
    "canvasHeight": 600,
    "gridSize": 20,
    "snapEnabled": true
  },
  "elements": [
    {
      "type": "button",
      "id": "btn_01",
      "label": "Save",
      "x": 120,
      "y": 80,
      "width": 96,
      "height": 32,
      "relX": "15.00",
      "relY": "13.33",
      "relWidth": "12.00",
      "relHeight": "5.33",
      "comment": "primary action, blue background"
    },
    {
      "type": "rect",
      "id": "rect_01",
      "label": "",
      "x": 0,
      "y": 0,
      "width": 800,
      "height": 60,
      "relX": "0.00",
      "relY": "0.00",
      "relWidth": "100.00",
      "relHeight": "10.00",
      "comment": "top app bar"
    }
  ]
}</textarea>
  <button id="renderBtn">Render</button>
</div>

<div class="preview" id="preview">
  <div id="canvas"></div>
</div>

<script>
const input = document.getElementById('input');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');
const renderBtn = document.getElementById('renderBtn');
const statusBar = document.createElement('div');
statusBar.className = 'status-bar';
document.body.appendChild(statusBar);

function render() {
  let data;
  try {
    data = JSON.parse(input.value);
  } catch (e) {
    canvas.innerHTML = '<div class="error">Invalid JSON: ' + e.message + '</div>';
    return;
  }

  if (!data || data.app !== 'autocanva') {
    canvas.innerHTML = '<div class="error">Not a valid AutoCanva export (missing "app": "autocanva").</div>';
    return;
  }

  const w = data.canvas.windowWidth || 1280;
  const h = data.canvas.windowHeight || 720;
  const elements = data.elements || [];

  statusBar.textContent = elements.length + ' elements · ' + w + '×' + h + ' window · schema v' + (data.schemaVersion || '?');

  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.innerHTML = '';

  elements.forEach(function(el) {
    const div = document.createElement('div');
    div.className = 'el el--' + (el.type || 'rect');
    div.title = el.comment || el.type + ' (' + el.id + ')';

    // Use rel* percentages if available, fallback to raw pixels
    const rx = parseFloat(el.relX) || 0;
    const ry = parseFloat(el.relY) || 0;
    const rw = parseFloat(el.relWidth) || 0;
    const rh = parseFloat(el.relHeight) || 0;

    div.style.left = (rx / 100 * w) + 'px';
    div.style.top = (ry / 100 * h) + 'px';
    div.style.width = (rw / 100 * w) + 'px';
    div.style.height = (rh / 100 * h) + 'px';

    if (el.type === 'icon' && el.label && el.label.length <= 2) {
      div.style.fontSize = Math.min(rh / 100 * h, rw / 100 * w) * 0.55 + 'px';
    }

    const tag = document.createElement('span');
    tag.className = 'type-tag';
    tag.textContent = (el.type || '?').slice(0, 4);

    if (el.type === 'rect' && !el.label) {
      div.textContent = '';
    } else {
      div.textContent = el.label || (el.type === 'image' ? '🖼' : el.type === 'icon' ? '' : '');
    }

    div.appendChild(tag);
    canvas.appendChild(div);
  });

  if (elements.length === 0) {
    canvas.innerHTML = '<div style="color:#a1a1aa;text-align:center;padding:40px">No elements in this export.</div>';
  }
}

renderBtn.addEventListener('click', render);

// Auto-render on paste
input.addEventListener('paste', function() {
  setTimeout(render, 50);
});

render();
</script>
</body>
</html>
